alfred:
  GDP:
    name: "US GDP"
    realtime: true
  GDPC1:
    name: "US Real GDP"
    realtime: true
  CPIAUCSL:
    name: "US CPI"
    realtime: true
  UNRATE:
    name: "US Unemployment Rate"
    realtime: true

eurostat:
  namq_10_gdp:
    name: "GDP and main components (Quarterly)"
    filters:
      unit: ["CLV10_MNAC", "CP_MNAC"]
      s_adj: ["SCA"]
      na_item: ["B1GQ", "P3", "P6", "P7"]
      geo: ["LT"]

  namq_10_pc:
    name: "Private consumption"
    filters:
      geo: ["LT"]

  namq_10_exi:
    name: "Exports/imports (quarterly)"
    filters:
      geo: ["LT"]

